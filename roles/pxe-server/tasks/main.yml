---
# Main entry point for PXE server role
# Orchestrates PXE server setup and Debian image bootstrap
# roles/pxe-server/tasks/main.yml
- import_tasks: setup_base.yml     # base packages, directories, dnsmasq, NFS
- import_tasks: debootstrap.yml    # build NFS root
- import_tasks: setup_pxe.yml      # PXE menu, copy vmlinuz/initrd, dnsmasq config
