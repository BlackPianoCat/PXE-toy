---
# playbook.yml
# Purpose: Fully functional PXE server setup with Ansible

# -------------------------------------------------
# Global config
# -------------------------------------------------
- name: Configure Ansible for PXE server
  hosts: localhost
  gather_facts: no
  tasks:
    - name: Disable SSH host key checking
      set_fact:
        ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'

# -------------------------------------------------
# Play 1: Base packages and pre-flight checks
# -------------------------------------------------
- name: Ensure PXE server has base packages
  hosts: pxe_servers
  become: yes
  gather_facts: yes
  tasks:

    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install essential packages
      apt:
        name:
          - ntpdate
          - debootstrap
          - sudo
          - vim
          - curl
          - wget
          - net-tools
          - iproute2
          - rsync
        state: present

    - name: Sync PXE server time with NTP
      command: ntpdate -u pool.ntp.org
      ignore_errors: yes

    - name: Ensure NFS root directory exists
      file:
        path: /srv/debian-root
        state: directory
        owner: root
        group: root
        mode: '0755'

# -------------------------------------------------
# Play 2: PXE server setup (roles)
# -------------------------------------------------
- name: Setup PXE server (TFTP, NFS, PXELINUX, dnsmasq)
  hosts: pxe_servers
  become: yes
  gather_facts: yes
  roles:
    - role: pxe-server
      vars:
        pxe_interface: eth1           # Vagrant host-only interface
        nfs_root: /srv/debian-root
        tftp_root: /srv/tftp
        dhcp_range_start: 192.168.56.100
        dhcp_range_end: 192.168.56.200

# -------------------------------------------------
# Play 3: PXE clients (bare placeholder)
# -------------------------------------------------
- name: PXE clients placeholder
  hosts: pxe_clients
  gather_facts: no
  tasks:
    - name: Inform PXE clients are ready to boot
      debug:
        msg: "PXE clients will boot automatically once PXE server is configured."

# -------------------------------------------------
# Optional: Pre-flight checks for Vagrant network
# -------------------------------------------------
- name: Verify PXE server network interface
  hosts: pxe_servers
  become: yes
  gather_facts: yes
  tasks:

    # --- Option 1: Using shell (compatible with your previous setup) ---
    - name: Check PXE interface IP (shell)
      shell: ip -4 addr show {{ pxe_interface }} | awk '/inet / {print $2}' | cut -d/ -f1
      register: pxe_ip
      changed_when: false
      failed_when: pxe_ip.stdout == ""

    - debug:
        msg: "PXE server {{ inventory_hostname }} interface {{ pxe_interface }} has IP {{ pxe_ip.stdout }}"

    # --- Option 2: Using Ansible facts (cleaner) ---
    #- name: Get PXE interface IP from facts
    #  set_fact:
    #    pxe_ip: "{{ ansible_facts['interfaces'][pxe_interface] | default(None) | community.general.ipaddr('ipv4') }}"
