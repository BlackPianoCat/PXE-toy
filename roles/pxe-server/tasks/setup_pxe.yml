---
# roles/pxe-server/tasks/setup_pxe.yml
# PXE boot setup: TFTP, PXELINUX, kernel/initrd, dnsmasq

# ----------------------------
# Ensure TFTP directories exist
# ----------------------------
- name: Ensure TFTP root and config directories exist
  file:
    path: "{{ item }}"
    state: directory
    owner: nobody
    group: nogroup
    mode: '0755'
  loop:
    - "{{ tftp_root | default('/srv/tftp') }}"
    - "{{ tftp_root | default('/srv/tftp') }}/pxelinux.cfg"

# ----------------------------
# Copy PXELINUX binaries
# ----------------------------
- name: Find pxelinux.0 binary
  shell: |
    for d in /usr/lib/PXELINUX /usr/lib/syslinux /usr/share/syslinux /usr/lib/syslinux/modules/bios; do
      [ -f "$d/pxelinux.0" ] && echo "$d/pxelinux.0" && exit 0
    done
  register: pxelinux_path
  changed_when: false
  failed_when: pxelinux_path.stdout == ""

- name: Copy pxelinux.0 to TFTP
  copy:
    remote_src: yes
    src: "{{ pxelinux_path.stdout }}"
    dest: "{{ tftp_root | default('/srv/tftp') }}/pxelinux.0"
    mode: '0644'

- name: Copy .c32 modules to TFTP
  shell: |
    for dir in /usr/lib/syslinux /usr/lib/PXELINUX /usr/lib/syslinux/modules/bios /usr/lib/x86_64-linux-gnu/syslinux; do
      [ -d "$dir" ] || continue
      cp -u "$dir"/*.c32 "{{ tftp_root | default('/srv/tftp') }}/" 2>/dev/null || true
    done
  args:
    executable: /bin/bash

# ----------------------------
# Copy kernel and initrd
# ----------------------------
- name: Copy latest kernel and initrd to TFTP
  shell: |
    mkdir -p "{{ tftp_root | default('/srv/tftp') }}"
    cp -u $(ls -1t {{ nfs_root | default('/srv/debian-root') }}/boot/vmlinuz-* | head -n1) "{{ tftp_root | default('/srv/tftp') }}/vmlinuz"
    cp -u $(ls -1t {{ nfs_root | default('/srv/debian-root') }}/boot/initrd.img-* | head -n1) "{{ tftp_root | default('/srv/tftp') }}/initrd.img"
  args:
    executable: /bin/bash

# ----------------------------
# Detect PXE interface IP dynamically
# ----------------------------
- name: Detect PXE server IP
  set_fact:
    pxe_ip: "{{ ansible_all_ipv4_addresses | select('match','192\\.168\\.56\\..*') | list | first }}"

# ----------------------------
# PXELINUX menu (template)
# ----------------------------
- name: Create PXELINUX default config from template
  template:
    src: pxelinux_default.cfg.j2
    dest: "{{ tftp_root | default('/srv/tftp') }}/pxelinux.cfg/default"
    mode: '0644'
  vars:
    pxe_ip: "{{ pxe_ip }}"   # dynamic now
    nfs_root: "/srv/debian-root"

- debug:
    msg: "PXE IP detected: {{ pxe_ip }}"
    
# ----------------------------
# DNS/DHCP setup
# ----------------------------
- name: Kill any processes using port 53
  shell: |
    fuser -k 53/tcp || true
    fuser -k 53/udp || true
  ignore_errors: yes

- name: Stop systemd-resolved if installed
  systemd:
    name: systemd-resolved
    state: stopped
    enabled: no
    masked: yes
  when: "'systemd-resolved.service' in ansible_facts.services"
  ignore_errors: yes

- name: Ensure /etc/resolv.conf has public DNS
  copy:
    dest: /etc/resolv.conf
    content: "nameserver 8.8.8.8\n"
    owner: root
    group: root
    mode: '0644'

# ----------------------------
# dnsmasq PXE config
# ----------------------------
- name: Write dnsmasq PXE configuration from template
  template:
    src: dnsmasq_pxe.conf.j2
    dest: /etc/dnsmasq.d/pxe.conf
    mode: '0644'

# ----------------------------
# Test dnsmasq config
# ----------------------------
- name: Test dnsmasq configuration
  command: dnsmasq --test
  register: dnsmasq_test
  changed_when: false
  ignore_errors: yes

- name: Show dnsmasq test output
  debug:
    var: dnsmasq_test.stdout_lines

# ----------------------------
# Stop dnsmasq before starting
# ----------------------------
- name: Stop dnsmasq if running
  systemd:
    name: dnsmasq
    state: stopped
    enabled: no
  ignore_errors: yes

# ----------------------------
# Start dnsmasq only if config valid
# ----------------------------
- name: Start and enable dnsmasq
  systemd:
    name: dnsmasq
    state: started
    enabled: yes
  when: dnsmasq_test.rc == 0

- name: Warn if dnsmasq failed
  debug:
    msg: |
      dnsmasq failed to start. Common issues:
      - Port 53 still in use
      - Invalid interface in template
      - Configuration syntax error
      Check with: systemctl status dnsmasq.service
  when: dnsmasq_test.rc != 0
