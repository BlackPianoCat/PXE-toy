---
# roles/pxe-server/tasks/setup_base.yml
# Install and configure NFS properly for PXE root

# ----------------------------
# Set PXE interface
# ----------------------------
- name: Set PXE interface fact
  set_fact:
    pxe_interface: "eth1"   # Vagrant host-only NIC

- name: Get PXE server IP from interface
  command: ip -4 -o addr show {{ pxe_interface }}
  register: pxe_ip_raw
  changed_when: false

- name: Extract PXE IP
  set_fact:
    pxe_ip: "{{ pxe_ip_raw.stdout.split()[3].split('/')[0] }}"

- debug:
    msg: "PXE interface={{ pxe_interface }}, IP={{ pxe_ip }}"

# ----------------------------
# Install required packages
# ----------------------------
- name: Install PXE/NFS packages
  apt:
    name:
      - dnsmasq
      - pxelinux
      - syslinux-common
      - nfs-kernel-server
      - rpcbind
      - tftp
      - net-tools
      - iproute2
      - rsync
    state: present
    update_cache: yes

# ----------------------------
# Ensure required services are enabled
# ----------------------------
- name: Enable and start rpcbind
  service:
    name: rpcbind
    state: started
    enabled: yes

# ----------------------------
# Prepare directories
# ----------------------------
- name: Ensure TFTP directories
  file:
    path: "{{ item }}"
    state: directory
    owner: nobody
    group: nogroup
    mode: '0755'
  loop:
    - /srv/tftp
    - /srv/tftp/pxelinux.cfg

- name: Ensure NFS root directory exists
  file:
    path: /srv/debian-root
    state: directory
    owner: root
    group: root
    mode: '0755'

# Important: allow root access via no_root_squash
- name: Ensure correct permissions on NFS root
  file:
    path: /srv/debian-root
    state: directory
    owner: root
    group: root
    mode: '0755'
    recurse: yes

# ----------------------------
# Configure NFS exports
# ----------------------------
- name: Configure /etc/exports for PXE root
  copy:
    dest: /etc/exports
    mode: '0644'
    content: |
      /srv/debian-root 192.168.56.0/24(rw,sync,no_subtree_check,no_root_squash)

- name: Apply NFS exports
  command: exportfs -ra

# ----------------------------
# Restart NFS completely
# ----------------------------
- name: Restart NFS server
  service:
    name: nfs-kernel-server
    state: restarted
    enabled: yes

# ----------------------------
# Ensure PXE interface is up
# ----------------------------
- name: Bring PXE interface up
  command: ip link set dev {{ pxe_interface }} up
